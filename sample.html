<style>
    #gallery {
        background: var(--cream);
        padding: 110px 0;
    }

    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        grid-template-rows: 250px 250px;
        gap: 8px;
    }

    .g-item:nth-child(1) {
        grid-column: 1/3;
        grid-row: 1/3;
    }

    .g-item:nth-child(2) {
        grid-column: 3/5;
        grid-row: 1/2;
    }

    .g-item:nth-child(3) {
        grid-column: 5/7;
        grid-row: 1/2;
    }

    .g-item:nth-child(4) {
        grid-column: 3/4;
        grid-row: 2/3;
    }

    .g-item:nth-child(5) {
        grid-column: 4/5;
        grid-row: 2/3;
    }

    .g-item:nth-child(6) {
        grid-column: 5/6;
        grid-row: 2/3;
    }

    .g-item:nth-child(7) {
        grid-column: 6/7;
        grid-row: 2/3;
    }

    .g-item {
        position: relative;
        overflow: hidden;
        cursor: pointer;
    }

    .g-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease, filter 0.4s ease;
        filter: brightness(0.85) saturate(0.8);
    }

    .g-item:hover img {
        transform: scale(1.1);
        filter: brightness(1) saturate(1.3);
    }

    .g-overlay {
        position: absolute;
        inset: 0;
        background: rgba(184, 134, 11, 0);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 8px;
        transition: background 0.4s;
    }

    .g-item:hover .g-overlay {
        background: rgba(184, 134, 11, 0.25);
    }

    .g-overlay i {
        font-size: 24px;
        color: white;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.35s;
    }

    .g-overlay-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: white;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.35s 0.05s;
    }

    .g-item:hover .g-overlay i,
    .g-item:hover .g-overlay-label {
        opacity: 1;
        transform: translateY(0);
    }

    .g-corner {
        position: absolute;
        bottom: 0;
        left: 0;
        border-right: 20px solid transparent;
        border-bottom: 20px solid var(--gold);
    }

    @media(max-width:768px) {
        .gallery-grid {
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: auto;
        }

        .g-item:nth-child(n) {
            grid-column: span 1 !important;
            grid-row: span 1 !important;
            min-height: 200px;
        }
    }
</style>

<section id="gallery">
    <div class="container-xl">
        <div class="row align-items-end mb-5">
            <div class="col-lg-5">
                <div class="sec-tag">Visual Showcase</div>
                <h2 class="sec-title">Steel in Every<br>Dimension</h2>
                <div class="gold-bar"></div>
            </div>
            <div class="col-lg-7">
                <p style="color:var(--text-mid);font-size:15px;line-height:1.9;">A curated gallery of steel products,
                    warehouse operations, and landmark structures built with Rajahmundry Steel materials across Andhra
                    Pradesh.</p>
            </div>
        </div>

        <div class="gallery-grid">
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=800&q=85" alt="Steel Plant">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">Steel Plant</div>
                </div>
                <div class="g-corner"></div>
            </div>
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1581094271901-8022df4466f9?w=700&q=80" alt="Steel Pipes">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">Steel Pipes</div>
                </div>
            </div>
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1587293852726-70cdb56c2866?w=600&q=80" alt="TMT Rods">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">TMT Rods</div>
                </div>
            </div>
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1548346535-6e8e8e3df9e5?w=600&q=80" alt="Construction">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">Construction</div>
                </div>
            </div>
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?w=600&q=80" alt="Warehouse">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">Warehouse</div>
                </div>
            </div>
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1581094794329-c8112a89af12?w=600&q=80" alt="Industrial">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">Industrial</div>
                </div>
            </div>
            <div class="g-item">
                <img src="https://images.unsplash.com/photo-1509391366360-2e959784a276?w=600&q=80" alt="Steel Coils">
                <div class="g-overlay"><i class="fas fa-search-plus"></i>
                    <div class="g-overlay-label">Steel Coils</div>
                </div>
            </div>
        </div>
    </div>
</section>
